<div class="table-container">
  <div class="table-actions" *ngIf="isAdmin()">
    <button mat-raised-button color="accent" (click)="openAddDialog()" class="add-btn">
      <mat-icon>person_add</mat-icon> Add New User
    </button>
    <button mat-icon-button (click)="loadUsers()" matTooltip="Refresh directory" class="refresh-btn">
      <mat-icon>refresh</mat-icon>
    </button>
  </div>

  <div class="responsive-table-wrapper">
    <table mat-table [dataSource]="users" class="custom-mat-table">
      
      <!-- User ID Column -->
      <ng-container matColumnDef="userId">
        <th mat-header-cell *matHeaderCellDef> User ID </th>
        <td mat-cell *matCellDef="let element"> 
          <span class="user-id-code">{{element.userId}}</span>
        </td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="fullName">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let element"> {{element.firstName}} {{element.lastName}} </td>
      </ng-container>

      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let element"> {{element.email}} </td>
      </ng-container>

      <!-- Department Column -->
      <ng-container matColumnDef="department">
        <th mat-header-cell *matHeaderCellDef> Department </th>
        <td mat-cell *matCellDef="let element"> {{element.department}} </td>
      </ng-container>

      <!-- Role Column -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef> Role </th>
        <td mat-cell *matCellDef="let element">
          <span class="role-chip" [ngClass]="element.role === 'Admin' ? 'admin-chip' : 'user-chip'">
            {{element.role}}
          </span>
        </td>
      </ng-container>

      <!-- Created At Column -->
      <ng-container matColumnDef="createdAt">
        <th mat-header-cell *matHeaderCellDef> Created Date </th>
        <td mat-cell *matCellDef="let element"> {{element.createdAt | date:'MMM d, y, h:mm a'}} </td>
      </ng-container>

      <!-- Actions Column -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef> Actions </th>
        <td mat-cell *matCellDef="let element">
          <div class="row-actions" *ngIf="isAdmin(); else noActions">
            <button mat-icon-button color="primary" (click)="openEditDialog(element)" matTooltip="Edit User">
              <mat-icon>edit</mat-icon>
            </button>
            <button mat-icon-button color="warn" (click)="deleteUser(element)" matTooltip="Delete User">
              <mat-icon>delete</mat-icon>
            </button>
          </div>
          <ng-template #noActions>
            <span class="text-muted">Read-only</span>
          </ng-template>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="table-row-hover"></tr>

      <!-- Row shown when there is no matching data. -->
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell empty-cell" [attr.colspan]="displayedColumns.length">
          <div class="empty-state">
            <mat-icon class="empty-icon">group_off</mat-icon>
            <p>No user records found.</p>
          </div>
        </td>
      </tr>
    </table>
  </div>
</div>
